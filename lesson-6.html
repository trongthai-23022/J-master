    <p>A big change has happened in the social media world. Australia has <span class="hl" data-w="banned" data-viet="bị cấm">banned</span> children <span class="hl" data-w="under-16s" data-viet="trẻ em dưới 16 tuổi">under the age of 16</span> from joining many <span class="hl" data-w="social networks" data-viet="mạng xã hội">social networks</span>. New laws say the under-16s cannot open accounts with sites like Facebook, Instagram, Reddit, Snapchat, Threads, TikTok, X, and YouTube. It is now the <span class="hl" data-w="responsibility" data-viet="trách nhiệm">responsibility</span> of these social media sites to make sure all of their users are aged 16 or above. Australia's government said it would fine the companies if they allowed children to <span class="hl" data-w="access" data-viet="truy cập">access</span> their sites. The <span class="hl" data-w="fines" data-viet="tiền phạt">fines</span> could be as much as $32.9 million. The companies said they would use different <span class="hl" data-w="methods" data-viet="phương pháp">methods</span> to check the age of their users. New users will have to <span class="hl" data-w="upload identification" data-viet="tải giấy tờ tùy thân lên">upload identification</span> and <span class="hl" data-w="scan their faces" data-viet="quét khuôn mặt">scan their faces</span>.</p>
    <p>Australia's Prime Minister said he introduced the ban because social media was <span class="hl" data-w="harming young minds" data-viet="gây hại cho trí óc non nớt">harming young minds</span>. He said a <span class="hl" data-w="study showed" data-viet="nghiên cứu chỉ ra">study showed</span> that 70 per cent of children aged 10-15 who used social media looked at <span class="hl" data-w="harmful content" data-viet="nội dung độc hại">harmful content</span>. This included information about <span class="hl" data-w="misogyny" data-viet="sự bài xích phụ nữ">misogyny</span>, <span class="hl" data-w="violence" data-viet="bạo lực">violence</span>, <span class="hl" data-w="eating disorders" data-viet="rối loạn ăn uống">eating disorders</span>, and <span class="hl" data-w="suicide" data-viet="tự tử">suicide</span>. He <span class="hl" data-w="advised" data-viet="khuyên">advised</span> children to do different things instead, like starting a new sport or learning to play a musical <span class="hl" data-w="musical instrument" data-viet="nhạc cụ">instrument</span>. His message to children was: "Spend <span class="hl" data-w="quality time" data-viet="thời gian chất lượng">quality time</span> with your friends and your family, <span class="hl" data-w="face to face" data-viet="trực tiếp">face to face</span>." Many children said they would now be <span class="hl" data-w="lonelier" data-viet="cô đơn hơn">lonelier</span> without social media. Two 15-year-olds are <span class="hl" data-w="suing" data-viet="kiện">suing</span> Australia's government. They say their "right to free communication" has been <span class="hl" data-w="taken away" data-viet="bị tước đoạt">taken away</span>.</p>

const VOCAB = [

  {w:"Suicide",pos:"noun",ipa:"/ˈsuːɪsaɪd/",viet:"Tự tử",def:"The act of intentionally taking one's own life",ex:"The Prime Minister spoke about content related to <strong>suicide</strong>."},
  {w:"Advised",pos:"verb",ipa:"/ədˈvaɪzd/",viet:"Khuyên",def:"Gave advice to someone; recommended a course of action",ex:"He <strong>advised</strong> children to do different offline activities instead."},
  {w:"Quality time",pos:"noun",ipa:"/ˈkwɒlɪti taɪm/",viet:"Thời gian chất lượng",def:"Time spent giving all of one's attention to friends or family",ex:"His message was to spend <strong>quality time</strong> with family face to face."},

  {w:"Lonelier",pos:"adjective",ipa:"/ˈloʊnliər/",viet:"Cô đơn hơn",def:"Feeling more unhappy because of being alone or without friends",ex:"Many children said they would be <strong>lonelier</strong> without social media."},
  {w:"Suing",pos:"verb",ipa:"/ˈsuːɪŋ/",viet:"Kiện",def:"Taking legal action against a person or government in court",ex:"Two 15-year-olds are <strong>suing</strong> Australia's government."},

  {w:"Taken away",pos:"verb",ipa:"/ˈteɪkən əˈweɪ/",viet:"Bị tước đoạt / Lấy đi",def:"Removed or stripped from someone",ex:"Their right to free communication has been <strong>taken away</strong>."},
  {w:"Under-16s",pos:"noun",ipa:"/ˈʌndər sɪksˈtiːnz/",viet:"Trẻ em dưới 16 tuổi",def:"People who are under 16 years of age",ex:"New laws say the <strong>under-16s</strong> cannot open social media accounts."},

  {w:"Study showed",pos:"phrase",ipa:"/ˈstʌdi ʃoʊd/",viet:"Nghiên cứu chỉ ra",def:"A scientific research paper revealed a specific fact",ex:"A <strong>study showed</strong> that 70% of children saw harmful content."}

const ART_PLAIN = `A big change has happened in the social media world. Australia has banned children under the age of 16 from joining many social networks. New laws say the under-16s cannot open accounts with sites like Facebook, Instagram, Reddit, Snapchat, Threads, TikTok, X, and YouTube. It is now the responsibility of these social media sites to make sure all of their users are aged 16 or above. Australia's government said it would fine the companies if they allowed children to access their sites. The fines could be as much as $32.9 million. The companies said they would use different methods to check the age of their users. New users will have to upload identification and scan their faces. Australia's Prime Minister said he introduced the ban because social media was harming young minds. He said a study showed that 70 per cent of children aged 10-15 who used social media looked at harmful content. This included information about misogyny, violence, eating disorders, and suicide. He advised children to do different things instead, like starting a new sport or learning to play a musical instrument. His message to children was: "Spend quality time with your friends and your family, face to face." Many children said they would now be lonelier without social media. Two 15-year-olds are suing Australia's government. They say their "right to free communication" has been taken away.`;
