const ART_PLAIN = `A new study shows that music therapy during surgery can help patients recover faster. Doctors at Maulana Azad Medical College in India tested soft flute music on 56 patients who needed gallbladder operations. The team gave all patients anaesthetic drugs, but only half listened to music through headphones during the operation. The other half had no music. Lead researcher Dr Tanvi Goel said the music group needed less painkiller medicine after waking up. "Music reduces stress and helps patients feel safe," she said. Dr Farah Husain, a specialist in anaesthesia, explained why music helps. Anaesthetic drugs block pain, she said, but the brain still hears sounds during surgery. Soft music helps the brain stay calm. Patients in the music group were more alert when nurses discharged them from the hospital. The team's aim is to make surgery less scary and to help patients heal more quickly. They believe music could become standard hospital care because it is cheap, safe, and easy to use anywhere in the world.`;
