const ART_PLAIN = `Birds are fascinating and beautiful creatures. Looking at them in the wild could be good for us. That is what researchers in Toronto, Canada say. The scientists found that birdwatching could protect our brains against age-related diseases. Lead researcher Dr Erik Wing said: "Skills from birding could be beneficial for intelligence and thinking as people age." Dr Wing and his colleagues compared scans of the brain activity of 29 veteran birdwatchers and 29 newbies. The brains of the veteran birders were a lot more active. Dr Wing said the veterans had a longer attention span and a better memory than those new to the hobby. He added that the veterans could also process information more quickly. The scientists believe birdwatching benefits the brain like learning a musical instrument. This is because the brain learns new skills, which add new pathways and connections. Dr Wing said birdwatching combines the ability to search for and identify things with a sensitivity to movement and pattern detection. Other scientists recommend the hobby. They say it is good for our mental health and can reduce stress. It is also good for our physical health because we are outside in the fresh air and sunlight. Other benefits include connecting with nature and becoming aware of the environment. Birdwatchers say their hobby is good for their social life because they meet many like-minded people.`;
