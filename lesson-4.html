<script>
const LESSON_CONFIG = {
  tag: "Wed 29/1/2026 · Breaking News English Level 3",
  title: "Bamboo Superfood",
  titleHtml: "Bamboo <em>Superfood</em>",
  sub: "Bamboo could be the world's next superfood, say scientists",
  emoji: "🎋",
  kicker: "📍 Anglia Ruskin University, UK · 29 January 2026",
  artHl: "Bamboo could be the world's next superfood, say scientists",
  artHtml: `
    <p>Bamboo could be the world's next <span class="hl" data-w="superfood" data-viet="siêu thực phẩm">superfood</span>. Scientists have been looking at all the studies on bamboo <span class="hl" data-w="shoots" data-viet="măng">shoots</span> to find out how healthy they are for us. The researchers are from Anglia Ruskin University in the UK. Lead author Professor Lee Smith said: "Our review shows bamboo's clear promise as a possible superfood." This is the first time scientists have put together all existing research to look at bamboo as a food.</p>
    <p>Professor Smith and his team found that bamboo shoots can be very <span class="hl" data-w="beneficial" data-viet="có lợi">beneficial</span> to our <span class="hl" data-w="well-being" data-viet="sức khỏe &amp; hạnh phúc">well-being</span>. The shoots are low in calories and fat, but high in <span class="hl" data-w="fibre" data-viet="chất xơ">fibre</span>. This fibre is good for our <span class="hl" data-w="digestion" data-viet="tiêu hóa">digestion</span> and helps the body control weight. Bamboo also contains many important vitamins and minerals. These include <span class="hl" data-w="selenium" data-viet="selen">selenium</span>, potassium, vitamins A, B6, and E. Scientists say these <span class="hl" data-w="nutrients" data-viet="chất dinh dưỡng">nutrients</span> are important for blood sugar levels, blood pressure, and heart health.</p>
    <p>The research also shows that bamboo can reduce <span class="hl" data-w="inflammation" data-viet="viêm">inflammation</span> in the body. It can also reduce oxidative stress. Bamboo contains three types of dietary fibre: cellulose, hemicellulose, and lignin. These have been shown to improve how the bowel works in humans. The scientists also found that bamboo can improve the levels of fat in the blood. This can lower the risk of heart disease.</p>
    <p>However, people need to be careful when preparing bamboo. Raw bamboo shoots contain natural <span class="hl" data-w="toxins" data-viet="độc tố">toxins</span>. People must boil them before eating to remove these toxins. Bamboo is already commonly eaten in many parts of Asia. Professor Smith said bamboo has great <span class="hl" data-w="potential" data-viet="tiềm năng">potential</span> to become a healthy and <span class="hl" data-w="sustainable" data-viet="bền vững">sustainable</span> addition to diets all over the world.</p>
  `,
  aiEnabled: true,
  theme: {
    bg: "#f3f7f2",
    border: "#c8d9c5",
    text: "#1a2419",
    muted: "#5a7055",
    accent: "#2d5a1b",
    accent2: "#52b788",
    light: "#e8f4e5"
  }
};

const VOCAB = [
  {w:"Superfood",pos:"noun",ipa:"/ˈsuːpərfuːd/",viet:"Siêu thực phẩm",def:"A food considered especially nutritious and very good for health",ex:"Scientists say bamboo could be the next <strong>superfood</strong>."},
  {w:"Shoots",pos:"noun",ipa:"/ʃuːts/",viet:"Măng",def:"Young stems of certain plants that can be eaten as food",ex:"Bamboo <strong>shoots</strong> are low in calories and high in fibre."},
  {w:"Beneficial",pos:"adjective",ipa:"/ˌbenɪˈfɪʃəl/",viet:"Có lợi",def:"Having a helpful or positive effect on something or someone",ex:"Bamboo shoots can be very <strong>beneficial</strong> to our well-being."},
  {w:"Well-being",pos:"noun",ipa:"/ˌwelˈbiːɪŋ/",viet:"Sức khỏe & hạnh phúc",def:"The state of being healthy, comfortable, and happy",ex:"Eating bamboo can improve your overall <strong>well-being</strong>."},
  {w:"Fibre",pos:"noun",ipa:"/ˈfaɪbər/",viet:"Chất xơ",def:"A substance in plant foods that helps the body with digestion",ex:"Bamboo is high in <strong>fibre</strong>, which is good for digestion."},
  {w:"Digestion",pos:"noun",ipa:"/daɪˈdʒestʃən/",viet:"Tiêu hóa",def:"The process the body uses to break down food into nutrients",ex:"Eating fibre is important for healthy <strong>digestion</strong>."},
  {w:"Nutrients",pos:"noun",ipa:"/ˈnjuːtriənts/",viet:"Chất dinh dưỡng",def:"Substances that provide nourishment essential for growth and health",ex:"Bamboo contains important <strong>nutrients</strong> like selenium and potassium."},
  {w:"Toxins",pos:"noun",ipa:"/ˈtɒksɪnz/",viet:"Độc tố",def:"Poisonous substances produced naturally that can harm the body",ex:"Raw bamboo shoots contain natural <strong>toxins</strong>."},
  {w:"Sustainable",pos:"adjective",ipa:"/səˈsteɪnəbəl/",viet:"Bền vững",def:"Able to continue without causing harm to the environment",ex:"Bamboo is a healthy and <strong>sustainable</strong> food source."},
  {w:"Potential",pos:"noun",ipa:"/pəˈtenʃəl/",viet:"Tiềm năng",def:"The possibility of future development or achievement",ex:"Professor Smith said bamboo has great <strong>potential</strong> as a superfood."},
  {w:"Inflammation",pos:"noun",ipa:"/ˌɪnfləˈmeɪʃən/",viet:"Viêm",def:"A condition where part of the body becomes swollen, red, and painful",ex:"Bamboo can help reduce <strong>inflammation</strong> in the body."},
  {w:"Selenium",pos:"noun",ipa:"/sɪˈliːniəm/",viet:"Selen",def:"A mineral the body needs in small amounts for good health",ex:"Bamboo contains <strong>selenium</strong>, which is important for the body."},
];

const TF_DATA = [
  {text:"This is not the first time scientists have studied bamboo as a food.",ans:"F",exp:"SAI — Đây là lần đầu tiên các nhà khoa học tổng hợp toàn bộ nghiên cứu về măng như một loại thực phẩm."},
  {text:"Bamboo shoots are low in calories and fat.",ans:"T",exp:"ĐÚNG — Bài đọc nói măng ít calo và ít chất béo."},
  {text:"Bamboo is not a good source of vitamins or minerals.",ans:"F",exp:"SAI — Măng chứa nhiều vitamin và khoáng chất quan trọng như selen, kali, vitamin A, B6 và E."},
  {text:"Raw bamboo shoots are safe to eat without any preparation.",ans:"F",exp:"SAI — Măng tươi chứa độc tố tự nhiên và phải được luộc trước khi ăn."},
  {text:"Bamboo is already a common food in parts of Asia.",ans:"T",exp:"ĐÚNG — Bài đọc cho biết măng đã được ăn phổ biến ở nhiều vùng châu Á."},
  {text:"Bamboo contains three different types of dietary fibre.",ans:"T",exp:"ĐÚNG — Đó là cellulose, hemicellulose và lignin."},
];

const GF = {
  bank:["superfood","fibre","toxins","sustainable","beneficial","digestion","nutrients","boiled"],
  parts:[
    "Scientists say bamboo could be the world's next (1)____.",
    "Bamboo shoots can be very (2)____ to our well-being.",
    "The shoots are high in (3)____, which is good for (4)____.",
    "Bamboo contains important (5)____ like selenium and potassium.",
    "Raw bamboo has natural (6)____ and must be (7)____ first.",
    "Bamboo is a healthy and (8)____ addition to our diet.",
  ],
  ans:["superfood","beneficial","fibre","digestion","nutrients","toxins","boiled","sustainable"]
};

const DISC_COMP = [
  {
    q:"Where are the researchers in this study from?",
    model:"The researchers are from Anglia Ruskin University in the UK.",
    note:"'Are from' = cấu trúc chỉ nguồn gốc. Ngắn gọn và đầy đủ là tốt nhất."
  },
  {
    q:"What are bamboo shoots low in?",
    model:"Bamboo shoots are low in calories and fat.",
    note:"'Be low in' = ít về mặt dinh dưỡng. 'Be high in' = nhiều. Đây là cặp từ rất hữu ích."
  },
  {
    q:"Name three nutrients found in bamboo.",
    model:"Bamboo contains selenium, potassium, and vitamins A, B6, and E.",
    note:"Liệt kê với serial comma. Bắt đầu thẳng vào điểm chính, không cần mở đầu dài."
  },
  {
    q:"How can bamboo help heart health?",
    model:"Bamboo can improve the levels of fat in the blood, which can lower the risk of heart disease.",
    note:"'Which can lower' = mệnh đề quan hệ bổ sung kết quả. Rất tự nhiên trong văn học thuật."
  },
  {
    q:"Why must bamboo be cooked before eating?",
    model:"Bamboo must be cooked before eating because raw bamboo shoots contain natural toxins.",
    note:"'Must be cooked' = passive obligation. 'Because' dẫn lý do trực tiếp và rõ ràng."
  },
  {
    q:"What did Professor Lee Smith say about bamboo?",
    model:"Professor Lee Smith said that bamboo has clear promise as a possible superfood.",
    note:"Reported speech: said + that + clause. Không dùng dấu ngoặc kép trong reported speech."
  },
];

const DISC_OPEN = [
  {
    q:"Do you think bamboo could become a popular food worldwide? Why or why not?",
    model:"Personally, I think bamboo has a good chance of becoming popular worldwide because it is nutritious, sustainable, and already well-known in Asian cuisine. However, many people in the West may need time to get used to eating it.",
    note:"'Personally, I think...' mở đầu ý kiến. 'However' thể hiện balanced view. 'Get used to' = quen với."
  },
  {
    q:"What other foods do you think should be called 'superfoods'? Why?",

    note:"'Such as' liệt kê ví dụ. 'Packed with' = giàu, chứa nhiều. Tự nhiên hơn 'full of'."
  },
  {

    note:"'Honestly' = thành thật mà nói. 'Should try to' = lời khuyên nhẹ nhàng cho bản thân."
  },
  {
    q:"Would you try bamboo shoots if they were on a restaurant menu? Why or why not?",

  },
  {
    q:"How do you think our eating habits will change in the next 20 years?",
    model:"I believe our eating habits will change significantly over the next 20 years. More people will likely eat less meat and focus on plant-based foods as we become more aware of health and the environment.",
    note:"'Will likely' = có khả năng sẽ. 'As we become more aware of' = khi chúng ta ý thức hơn về."
  },

    note:"'Increasingly important' = ngày càng quan trọng. 'Small changes... big difference' = cấu trúc tương phản hiệu quả."
  },
];

const AW_PROMPTS = [
  {viet:"Măng tre có thể trở thành siêu thực phẩm tiếp theo của thế giới.",hint:"bamboo shoots / could become / world's next / superfood",grammar:"S + could + become + article + noun phrase"},
  {viet:"Ăn nhiều chất xơ rất tốt cho tiêu hóa và giúp kiểm soát cân nặng.",hint:"eating lots of fibre / good for digestion / help control / weight",grammar:"Gerund subject: Eating... is good for... and helps + V"},

];

const ART_PLAIN = `Bamboo could be the world's next superfood. Scientists have been looking at all the studies on bamboo shoots to find out how healthy they are for us. The researchers are from Anglia Ruskin University in the UK. Lead author Professor Lee Smith said: "Our review shows bamboo's clear promise as a possible superfood." This is the first time scientists have put together all existing research to look at bamboo as a food. Professor Smith and his team found that bamboo shoots can be very beneficial to our well-being. The shoots are low in calories and fat, but high in fibre. This fibre is good for our digestion and helps the body control weight. Bamboo also contains many important vitamins and minerals. These include selenium, potassium, vitamins A, B6, and E. Scientists say these nutrients are important for blood sugar levels, blood pressure, and heart health. The research also shows that bamboo can reduce inflammation in the body. It can also reduce oxidative stress. Bamboo contains three types of dietary fibre: cellulose, hemicellulose, and lignin. These have been shown to improve how the bowel works in humans. The scientists also found that bamboo can improve the levels of fat in the blood. This can lower the risk of heart disease. However, people need to be careful when preparing bamboo. Raw bamboo shoots contain natural toxins. People must boil them before eating to remove these toxins. Bamboo is already commonly eaten in many parts of Asia. Professor Smith said bamboo has great potential to become a healthy and sustainable addition to diets all over the world.`;
